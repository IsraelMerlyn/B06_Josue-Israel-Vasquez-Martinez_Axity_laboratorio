spring.application.name=bloque4_axity



# Cambiar el puerto del servidor para evitar colisiones con el puerto 8080
server.port=8085


# Base de datos H2 en memoria 
spring.datasource.url=jdbc:h2:mem:parkdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console habilitada
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Indicar a Spring Boot que busque nuestro archivo de configuración de base de datos en formato XML
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
spring.datasource.url=jdbc:h2:mem:parkdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY